provider: vertexai
model: gemini-3.1-pro-preview
docs_dir: docs
include_footer: true
style_md_path: docs/style.md
use_git: true
ignore_above_size_kb: 100
agent_threshold_kb: 0
ignore_patterns:
- .git
- __pycache__
- venv
- .venv
- env
- node_modules
- .env
- '*.pyc'
- '*.pyo'
- documentor.yaml
- documentor-lock.yaml
- uv.lock
