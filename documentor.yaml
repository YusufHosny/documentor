provider: vertexai
model: gemini-3.1-pro-preview
docs_dir: docs
include_footer: true
required_only: true
use_style_md: true
style_md_path: docs/style.md
use_git: true
required_files:
- filename: readme.md
  type: Overview
  description: general description, installation, usage instructions
ignore_above_size_kb: 100
ignore_patterns:
- .git
- __pycache__
- venv
- .venv
- env
- node_modules
- .env
- '*.pyc'
- '*.pyo'
- documentor.yaml
- documentor-lock.yaml
