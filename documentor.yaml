provider: vertexai
model: gemini-3.1-pro
docs_dir: docs
include_footer: false
required_only: false
use_style_md: false
style_md_path: docs/style.md
required_files:
- filename: README.md
  type: Project Overview, Installation, Usage
ignore_above_size_kb: 100
ignore_patterns:
- .git
- __pycache__
- venv
- .venv
- env
- node_modules
- .env
- '*.pyc'
- '*.pyo'
